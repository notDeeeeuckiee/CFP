<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CFD Page Not Found</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f4f4f4;
        color: #222;
    }

    header {
        background-color: #0d1b2a;
        color: white;
        padding: 18px 40px;
        border-bottom: 4px solid #1b263b;
    }

    header h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 1px;
        font-weight: 600;
    }

    .hero {
        background-color: #1b263b;
        color: white;
        padding: 60px 40px;
        border-bottom: 4px solid #415a77;
    }

    .hero h2 {
        margin: 0;
        font-size: 36px;
        font-weight: 700;
    }

    .hero p {
        margin-top: 10px;
        font-size: 18px;
        max-width: 600px;
        line-height: 1.5;
    }

    section {
        padding: 50px 40px;
        background-color: white;
        border-bottom: 1px solid #ddd;
        margin-bottom: 20px;
    }

    footer {
        background-color: #0d1b2a;
        color: white;
        text-align: center;
        padding: 20px;
        font-size: 14px;
        border-top: 4px solid #1b263b;
    }
</style>
</head>

<body>

<header>
    <h1>Coldfront Digital</h1>
</header>

<div class="hero">
    <h2>404 Page Not Found</h2>
    <p id="error-text">The page you were looking for could not be found.</p>
</div>

<section>
    <p>You may have mistyped the URL, or the page may have been moved or has been discontinued.</p>
    <p><a href="/" style="color:#1b263b; text-decoration:underline;">Return Home</a></p>
</section>

<footer>
    © 2026 Coldfront Digital - All Rights Reserved
</footer>

<script>
    const path = window.location.pathname;
    document.getElementById("error-text").textContent =
        `"${path}" was not found on this server.`;
</script>

</body>
</html>
